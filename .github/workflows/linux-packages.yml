name: Linux Packages (.deb)

on:
  push:
    tags: ['[0-9]*']
  pull_request:
    paths:
      - 'debian/**'
      - '.github/workflows/linux-packages.yml'
  workflow_dispatch:

jobs:
  build-deb:
    name: ${{ matrix.codename }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64 (native on GitHub-hosted x86_64 runners)
          - { codename: bookworm, image: 'debian:bookworm', arch: amd64, platform: 'linux/amd64',  runner: ubuntu-latest }
          - { codename: trixie,   image: 'debian:trixie',   arch: amd64, platform: 'linux/amd64',  runner: ubuntu-latest }
          - { codename: jammy,    image: 'ubuntu:jammy',    arch: amd64, platform: 'linux/amd64',  runner: ubuntu-latest }
          - { codename: noble,    image: 'ubuntu:noble',    arch: amd64, platform: 'linux/amd64',  runner: ubuntu-latest }
          - { codename: plucky,   image: 'ubuntu:plucky',   arch: amd64, platform: 'linux/amd64',  runner: ubuntu-latest }
          # arm64 (native on GitHub-hosted arm64 runners)
          - { codename: bookworm, image: 'debian:bookworm', arch: arm64, platform: 'linux/arm64',  runner: ubuntu-24.04-arm }
          - { codename: trixie,   image: 'debian:trixie',   arch: arm64, platform: 'linux/arm64',  runner: ubuntu-24.04-arm }
          - { codename: jammy,    image: 'ubuntu:jammy',    arch: arm64, platform: 'linux/arm64',  runner: ubuntu-24.04-arm }
          - { codename: noble,    image: 'ubuntu:noble',    arch: arm64, platform: 'linux/arm64',  runner: ubuntu-24.04-arm }
          - { codename: plucky,   image: 'ubuntu:plucky',   arch: arm64, platform: 'linux/arm64',  runner: ubuntu-24.04-arm }
          # armhf (emulated via QEMU on x86_64 runners)
          - { codename: bookworm, image: 'debian:bookworm', arch: armhf, platform: 'linux/arm/v7', runner: ubuntu-latest, qemu: true }
          - { codename: trixie,   image: 'debian:trixie',   arch: armhf, platform: 'linux/arm/v7', runner: ubuntu-latest, qemu: true }
          - { codename: jammy,    image: 'ubuntu:jammy',    arch: armhf, platform: 'linux/arm/v7', runner: ubuntu-latest, qemu: true }
          - { codename: noble,    image: 'ubuntu:noble',    arch: armhf, platform: 'linux/arm/v7', runner: ubuntu-latest, qemu: true }
          - { codename: plucky,   image: 'ubuntu:plucky',   arch: armhf, platform: 'linux/arm/v7', runner: ubuntu-latest, qemu: true }

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7

      - name: Build .deb
        env:
          CODENAME: ${{ matrix.codename }}
          IMAGE: ${{ matrix.image }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          mkdir -p artifacts

          docker run --rm \
            --platform="${PLATFORM}" \
            -v "${PWD}:/src" \
            -w /src \
            -e DEBIAN_FRONTEND=noninteractive \
            -e CODENAME="${CODENAME}" \
            -e DEBEMAIL="jamesowens@optonline.net" \
            -e DEBFULLNAME="James C. Owens" \
            "${IMAGE}" \
            bash -eux -c '
              apt-get update
              apt-get install -y --no-install-recommends \
                  ca-certificates devscripts equivs fakeroot \
                  build-essential dpkg-dev lintian

              # Prepend a per-codename changelog entry so the .deb filename and
              # version encode the target distro (e.g. 0.9.0.0-1~bookworm).
              CURRENT_VER=$(dpkg-parsechangelog -S Version)
              dch --force-distribution \
                  --newversion "${CURRENT_VER}~${CODENAME}" \
                  --distribution "${CODENAME}" \
                  "Rebuild for ${CODENAME}."
              head -n 5 debian/changelog

              # Install build-deps from debian/control. mk-build-deps generates
              # a stub package that declares the Build-Depends, installs it via
              # apt, then cleans up.
              mk-build-deps --install --remove \
                  --tool "apt-get -y --no-install-recommends" debian/control

              # Binary-only build; we do not publish a source package here.
              dpkg-buildpackage -b -us -uc -rfakeroot

              mv ../*.deb /src/artifacts/
              ls -la /src/artifacts/
            '

      - name: Lintian
        if: matrix.arch == 'amd64'
        env:
          IMAGE: ${{ matrix.image }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          docker run --rm \
            --platform="${PLATFORM}" \
            -v "${PWD}:/src" \
            -w /src \
            -e DEBIAN_FRONTEND=noninteractive \
            "${IMAGE}" \
            bash -eux -c '
              apt-get update
              apt-get install -y --no-install-recommends lintian
              lintian --no-tag-display-limit artifacts/*.deb || true
            '

      - uses: actions/upload-artifact@v4
        with:
          name: idle-detect_${{ matrix.codename }}_${{ matrix.arch }}
          path: artifacts/*.deb
          if-no-files-found: error

  release:
    name: Attach .debs to release
    needs: build-deb
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'idle-detect_*'
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum *.deb > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/*.deb
            artifacts/SHA256SUMS.txt
